<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Öğrenci Girişi</title>
    <style>
        :root {
            --bg: #f4f8fb;
            --card: #ffffff;
            --primary: #2555a7;
            --secondary: #1f7bbf;
            --accent: #10b981;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
            color: var(--text);
        }
        .page {
            display: grid;
            min-height: 100vh;
            place-items: center;
            padding: 24px;
        }
        .card {
            width: min(460px, 100%);
            padding: 32px;
            border-radius: 28px;
            background: var(--card);
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(226, 232, 240, 0.95);
        }
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            color: white;
            font-weight: 700;
            font-size: 18px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 2rem;
            letter-spacing: -0.04em;
        }
        p.subtitle {
            margin: 0 0 28px;
            color: var(--muted);
            line-height: 1.75;
        }
        .form-group {
            display: grid;
            gap: 10px;
            margin-bottom: 24px;
        }
        label {
            font-size: 0.95rem;
            color: var(--muted);
        }
        input[type="text"] {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 1rem;
            background: #f9fafb;
            color: var(--text);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
        }
        button {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 14px 16px;
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 12px 24px rgba(37, 85, 167, 0.18);
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 28px rgba(37, 85, 167, 0.24);
        }
        .message {
            border-radius: 14px;
            padding: 14px 16px;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="page">
        <section class="card">
            <div class="brand">
                <span class="brand-mark">ODS</span>
                <div>
                    <p style="margin:0;font-size:.95rem;color:var(--muted);text-transform:uppercase;letter-spacing:.2em;">Sınav Yönetim Sistemi</p>
                    <p style="margin:6px 0 0;font-weight:700;font-size:1rem;color:var(--text);">Öğrenci Girişi</p>
                </div>
            </div>
            <h1>Hemen sınava başla</h1>
            <p class="subtitle">Öğrenci numaranı girerek aktif sınavlara hızlıca erişebilirsin. Detaylı kayıt gerekmez.</p>
            {% if messages %}
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="ogrenci_no">Öğrenci Numarası</label>
                    <input id="ogrenci_no" type="text" name="ogrenci_no" required placeholder="Ör. 222" />
                </div>
                <button type="submit">Giriş Yap</button>
            </form>
        </section>
    </div>
</body>
</html>
