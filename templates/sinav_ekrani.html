<!DOCTYPE html>
<html lang="tr">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{{ sinav.ad }} - Sınavdasınız</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h2 class="mb-0">{{ sinav.ad }}</h2>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <input type="text" name="ogrenci_no" class="form-control" placeholder="Öğrenci No" required>
                        </div>
                        <div class="col-md-4">
                            <input type="text" name="ad" class="form-control" placeholder="Adınız" required>
                        </div>
                        <div class="col-md-4">
                            <input type="text" name="soyad" class="form-control" placeholder="Soyadınız" required>
                        </div>
                    </div>
                    <hr>
                    {% for soru in sinav.sorular.all %}
                        <div class="mb-4">
                            <h5>{{ forloop.counter }}. {{ soru.metin }}</h5>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="soru_{{ soru.id }}" value="A" id="s{{ soru.id }}a" required>
                                <label class="form-check-label" for="s{{ soru.id }}a">A) {{ soru.secenek_a }}</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="soru_{{ soru.id }}" value="B" id="s{{ soru.id }}b">
                                <label class="form-check-label" for="s{{ soru.id }}b">B) {{ soru.secenek_b }}</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="soru_{{ soru.id }}" value="C" id="s{{ soru.id }}c">
                                <label class="form-check-label" for="s{{ soru.id }}c">C) {{ soru.secenek_c }}</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="soru_{{ soru.id }}" value="D" id="s{{ soru.id }}d">
                                <label class="form-check-label" for="s{{ soru.id }}d">D) {{ soru.secenek_d }}</label>
                            </div>
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success btn-lg w-100">Sınavı Bitir ve Gönder</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
